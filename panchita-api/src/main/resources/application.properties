
# CONFIGURACIÓN DE CONEXIÓN A MYSQL
# Los valores después de ":" son los que se usan si la variable de entorno
# no está definida (para que siga funcionando igual en desarrollo local).
# DB_SSL_MODE: "false" para MySQL local, "REQUIRED" para Aiven (u otro
# proveedor en la nube que exija SSL).
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:restaurante}?useSSL=${DB_USE_SSL:false}&sslMode=${DB_SSL_MODE:DISABLED}&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=happier71560264

# CONFIGURACIÓN DE JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=true

# CONFIGURACIÓN DE JWT
jwt.secret=${JWT_SECRET:EsteEsUnSecretoSuperLargoYSeguroParaPanchita2026QueCumpleConLosBitsRequeridos12345}
jwt.expiration-ms=28800000

# CÓDIGO SECRETO PARA REGISTRO DE ADMINISTRADOR
app.admin.secret-code=${ADMIN_SECRET_CODE:PANCHITA2026}

# ORIGEN PERMITIDO PARA CORS (frontend en desarrollo)
app.cors.allowed-origin=http://localhost:5173

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

info.app.name=Panchita API
info.app.description=Sistema de reservas de restaurante La Panchita
info.app.version=1.0.0