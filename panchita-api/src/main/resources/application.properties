# CONFIGURACIÓN DE CONEXIÓN A MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/restaurante?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin

# CONFIGURACIÓN DE JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=true

# CONFIGURACIÓN DE JWT
jwt.secret=EsteEsUnSecretoSuperLargoYSeguroParaPanchita2026QueCumpleConLosBitsRequeridos12345
jwt.expiration-ms=28800000

# CÓDIGO SECRETO PARA REGISTRO DE ADMINISTRADOR
app.admin.secret-code=${ADMIN_SECRET_CODE:PANCHITA2026}

# ORIGEN PERMITIDO PARA CORS (frontend en desarrollo)
app.cors.allowed-origin=http://localhost:5173

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

info.app.name=Panchita API
info.app.description=Sistema de reservas de restaurante La Panchita
info.app.version=1.0.0